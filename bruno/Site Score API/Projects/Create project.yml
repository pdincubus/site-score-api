info:
  name: Create project
  type: http
  seq: 1

http:
  method: POST
  url: "{{baseUrl}}/projects"
  body:
    type: json
    data: |-
      {
        "name": "My project",
        "url": "https://example.com"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
